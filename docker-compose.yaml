services:
    # frontend:
    #   build:
    #     context: ./frontend
    #     dockerfile: Dockerfile
    #   ports:
    #     - 3000:80
    #   environment:
    #     - REACT_APP_API_URL=http://localhost/api
    #   networks:
    #     - mynetwork
    #   depends_on:
    #     - gateway

    gateway:
        build:
            context: .
            dockerfile: ApiGateway/Dockerfile
        ports:
            - 80:80
            - 443:443
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ASPNETCORE_URLS=http://+:80;https://+:443
            - ASPNETCORE_Kestrel__Certificates__Default__Password=P@ssword123!
            - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
            - ENABLE_SCALAR=true
        depends_on:
            auth:
                condition: service_healthy
            goservice:
                condition: service_healthy
            fast_api:
                condition: service_healthy
            spring:
                condition: service_healthy
            laravel:
                condition: service_healthy
            js_express:
                condition: service_healthy
        networks:
            - mynetwork
        volumes:
            - ~/.aspnet/https:/https:ro
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:80/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 30s

    auth:
        build:
            context: .
            dockerfile: AuthService/Dockerfile
        ports:
            - 8080:80
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ASPNETCORE_URLS=http://+:80
            - ENABLE_SCALAR=true
            - MINIO_ACCESS_KEY_ID=admin
            - MINIO_SECRET_ACCESS_KEY=admin123
            - MINIO_BUCKET=uploads
            - MINIO_ENDPOINT=minio:9000
            - MINIO_USE_PATH_STYLE_ENDPOINT=true
        depends_on:
            db_manager:
                condition: service_healthy
        networks:
            - mynetwork
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:80/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 20s

    db_manager:
        build:
            context: .
            dockerfile: DatabaseManager/Dockerfile
        ports:
            - 8090:80
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ASPNETCORE_URLS=http://+:80
            - ENABLE_SCALAR=true
        depends_on:
            database:
                condition: service_healthy
        networks:
            - mynetwork
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:80/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 20s

    redis:
        image: redis:latest
        ports:
            - 6379:6379
        volumes:
            - redis_data:/data
        networks:
            - mynetwork
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 3
            start_period: 10s

    redisinsight:
        image: redislabs/redisinsight:latest
        ports:
            - 5540:5540
        depends_on:
            redis:
                condition: service_healthy
        networks:
            - mynetwork
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:5540/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 20s

    goservice:
        build:
            context: ./go
            dockerfile: Dockerfile
        depends_on:
            rabbitmq:
                condition: service_healthy
            db_manager:
                condition: service_started
        networks:
            - mynetwork
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 20s
        environment:
            - RABBITMQ_HOST=rabbitmq
            - RABBITMQ_PORT=5672
            - RABBITMQ_USER=user
            - RABBITMQ_PASS=password

    fast_api:
        build:
            context: ./fast_api
            dockerfile: Dockerfile
        networks:
            - mynetwork
        ports:
            - 7070:8000
        depends_on:
            rabbitmq:
                condition: service_healthy
            db_manager:
                condition: service_started
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s
        environment:
            - RABBITMQ_HOST=rabbitmq
            - RABBITMQ_PORT=5672
            - RABBITMQ_USER=user
            - RABBITMQ_PASS=password

    spring:
        build:
            context: ./JavaService
            dockerfile: Dockerfile
        networks:
            - mynetwork
        ports:
            - 2020:8080
        depends_on:
            - db_manager
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 40s

    laravel:
        build:
            context: ./laravel
            dockerfile: Dockerfile
        volumes:
            - ./laravel/app:/var/www/app
            - ./laravel/bootstrap:/var/www/bootstrap
            - ./laravel/config:/var/www/config
            - ./laravel/database:/var/www/database
            - ./laravel/public:/var/www/public
            - ./laravel/resources:/var/www/resources
            - ./laravel/routes:/var/www/routes
            - ./laravel/storage:/var/www/storage
        environment:
            - DB_CONNECTION=pgsql
            - DB_HOST=database
            - DB_PORT=5432
            - DB_DATABASE=project
            - DB_USERNAME=postgres
            - DB_PASSWORD=P@ssword123!
        networks:
            - mynetwork
        depends_on:
            db_manager:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "php", "artisan", "--version"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 30s

    nginx:
        image: nginx:alpine
        ports:
            - 7000:80
        volumes:
            - ./laravel/public:/var/www/public
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - mynetwork
        depends_on:
            laravel:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost/health"]
            interval: 10s
            timeout: 5s
            retries: 3
    js_express:
        build:
            context: ./js_express
            dockerfile: Dockerfile
        networks:
            - mynetwork
        ports:
            - 6713:6713
        depends_on:
            db_manager:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:6713/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 20s

    pgadmin:
        image: dpage/pgadmin4
        ports:
            - 15433:80
        depends_on:
            database:
                condition: service_healthy
        networks:
            - mynetwork
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@example.com
            PGADMIN_DEFAULT_PASSWORD: admin
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:80/misc/ping"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 30s

    database:
        image: postgres
        ports:
            - 5432:5432
        networks:
            - mynetwork
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: P@ssword123!
            POSTGRES_DB: project
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s

    rabbitmq:
        image: rabbitmq:3-management
        ports:
            - 5672:5672
            - 15672:15672
        environment:
            RABBITMQ_DEFAULT_USER: user
            RABBITMQ_DEFAULT_PASS: password
        networks:
            - mynetwork
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "status"]
            interval: 10s
            timeout: 30s
            retries: 5
            start_period: 40s

    minio:
        image: quay.io/minio/minio:latest
        container_name: minio
        ports:
            - 9000:9000 # API MinIO (S3)
            - 9090:9090 # MinIO Console (UI)
        environment:
            MINIO_ROOT_USER: admin
            MINIO_ROOT_PASSWORD: admin123
            MINIO_SERVER_URL: http://localhost:9000
            MINIO_CONSOLE_ADDRESS: ":9090"
        volumes:
            - minio_data:/data
        command: server /data --console-address ":9090"
        networks:
            - mynetwork
        healthcheck:
            test:
                ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s
networks:
    mynetwork:
        driver: bridge

volumes:
    pgdata:
    minio_data:
    redis_data:
